<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">SSE Deployment Events Architecture</text>
  <text x="550" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">feat/sse branch  --  agent submodule</text>

  <!-- ==================== ROW 1: Event Source ==================== -->

  <!-- Backend Cloud -->
  <rect x="60" y="80" width="200" height="60" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#0369a1">Miru Backend</text>
  <text x="160" y="122" text-anchor="middle" font-size="11" fill="#64748b">deployment state source</text>

  <!-- Arrow down -->
  <line x1="160" y1="140" x2="160" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="170" y="160" font-size="10" fill="#94a3b8">pull</text>

  <!-- ==================== ROW 2: Sync Layer ==================== -->

  <!-- Sync box -->
  <rect x="40" y="172" width="240" height="88" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Sync Engine</text>
  <text x="160" y="212" text-anchor="middle" font-size="11" fill="#64748b" font-family="JetBrains Mono, monospace">sync/deployments.rs</text>
  <text x="160" y="230" text-anchor="middle" font-size="11" fill="#64748b">apply_deployments()</text>
  <rect x="60" y="238" width="90" height="18" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="105" y="250" text-anchor="middle" font-size="10" fill="#166534">Deployed</text>
  <rect x="162" y="238" width="90" height="18" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="207" y="250" text-anchor="middle" font-size="10" fill="#92400e">Archived</text>

  <!-- Arrow right from sync to EventHub -->
  <line x1="280" y1="216" x2="380" y2="216" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="330" y="208" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="500">try_publish()</text>

  <!-- ==================== ROW 2: EventHub (Actor) ==================== -->

  <rect x="382" y="152" width="320" height="130" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="542" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">EventHub</text>
  <text x="542" y="194" text-anchor="middle" font-size="11" fill="#3b82f6">Actor pattern  --  single worker task</text>

  <!-- mpsc channel -->
  <rect x="400" y="206" width="132" height="58" rx="6" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="466" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Command Channel</text>
  <text x="466" y="240" text-anchor="middle" font-size="10" fill="#64748b" font-family="JetBrains Mono, monospace">mpsc::Sender</text>
  <text x="466" y="254" text-anchor="middle" font-size="10" fill="#64748b">Publish | ReplayAfter</text>

  <!-- broadcast -->
  <rect x="550" y="206" width="134" height="58" rx="6" fill="#fff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="617" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Broadcast</text>
  <text x="617" y="240" text-anchor="middle" font-size="10" fill="#64748b" font-family="JetBrains Mono, monospace">broadcast::Sender</text>
  <text x="617" y="254" text-anchor="middle" font-size="10" fill="#64748b">capacity: 256</text>

  <!-- ==================== ROW 3: Storage ==================== -->

  <!-- Arrow down from EventHub to Store -->
  <line x1="466" y1="282" x2="466" y2="330" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="478" y="310" font-size="10" fill="#94a3b8">append</text>

  <!-- EventStore -->
  <rect x="340" y="332" width="260" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="470" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">EventStore</text>
  <text x="470" y="374" text-anchor="middle" font-size="11" fill="#64748b" font-family="JetBrains Mono, monospace">events/store.rs</text>

  <!-- In-memory cache -->
  <rect x="356" y="384" width="104" height="36" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="408" y="400" text-anchor="middle" font-size="10" font-weight="500" fill="#166534">In-memory cache</text>
  <text x="408" y="412" text-anchor="middle" font-size="9" fill="#64748b">max 2,000 events</text>

  <!-- JSONL file -->
  <rect x="474" y="384" width="112" height="36" rx="5" fill="#fefce8" stroke="#fcd34d" stroke-width="1"/>
  <text x="530" y="400" text-anchor="middle" font-size="10" font-weight="500" fill="#854d0e">JSONL on disk</text>
  <text x="530" y="412" text-anchor="middle" font-size="9" fill="#64748b" font-family="JetBrains Mono, monospace">events.jsonl</text>

  <!-- Disk path annotation -->
  <rect x="340" y="448" width="260" height="22" rx="4" fill="#f1f5f9"/>
  <text x="470" y="463" text-anchor="middle" font-size="10" fill="#64748b" font-family="JetBrains Mono, monospace">/var/lib/miru/events/events.jsonl</text>

  <!-- ==================== ROW 3: SSE Handler ==================== -->

  <!-- Arrow right from broadcast to SSE handler -->
  <line x1="684" y1="235" x2="734" y2="235" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="709" y="228" text-anchor="middle" font-size="10" fill="#94a3b8">live</text>

  <!-- Arrow from store to SSE (replay) -->
  <path d="M600,382 L680,382 L680,320 L734,320" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="700" y="348" font-size="10" fill="#94a3b8">replay</text>

  <!-- SSE Handler -->
  <rect x="736" y="172" width="300" height="200" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="886" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">SSE Handler</text>
  <text x="886" y="214" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="JetBrains Mono, monospace">GET /v0.2/events</text>
  <text x="886" y="230" text-anchor="middle" font-size="11" fill="#64748b" font-family="JetBrains Mono, monospace">server/sse.rs</text>

  <!-- Steps inside handler -->
  <rect x="756" y="242" width="260" height="118" rx="6" fill="#fff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="770" y="258" font-size="11" fill="#4c1d95" font-weight="600">Connection Flow:</text>
  <text x="770" y="276" font-size="10" fill="#64748b">1. Resolve cursor (after param / Last-Event-ID)</text>
  <text x="770" y="292" font-size="10" fill="#64748b">2. Subscribe to broadcast channel</text>
  <text x="770" y="308" font-size="10" fill="#64748b">3. Replay stored events after cursor</text>
  <text x="770" y="324" font-size="10" fill="#64748b">4. Chain live stream (dedup by id)</text>
  <text x="770" y="340" font-size="10" fill="#64748b">5. Apply type filter + 30s heartbeat</text>

  <!-- ==================== ROW 4: Clients ==================== -->

  <!-- Arrow down from SSE handler to clients -->
  <line x1="886" y1="372" x2="886" y2="430" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="898" y="404" font-size="10" fill="#94a3b8">stream</text>

  <!-- SSE Client box -->
  <rect x="736" y="432" width="300" height="120" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="886" y="456" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">SSE Clients</text>
  <text x="886" y="474" text-anchor="middle" font-size="11" fill="#64748b">Unix socket connection</text>

  <!-- SSE frame example -->
  <rect x="756" y="484" width="260" height="56" rx="5" fill="#1e293b"/>
  <text x="768" y="498" font-size="10" fill="#86efac" font-family="JetBrains Mono, monospace">id: 42</text>
  <text x="768" y="512" font-size="10" fill="#93c5fd" font-family="JetBrains Mono, monospace">event: deployment.deployed.beta1</text>
  <text x="768" y="526" font-size="10" fill="#fcd34d" font-family="JetBrains Mono, monospace">data: {"id":42,"type":"...","data":{..}}</text>

  <!-- ==================== ROW 5: Event Types ==================== -->

  <rect x="60" y="510" width="620" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="536" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Event Types</text>

  <!-- deployment.deployed.beta1 -->
  <rect x="80" y="548" width="280" height="76" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="220" y="568" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">deployment.deployed.beta1</text>
  <text x="220" y="586" text-anchor="middle" font-size="10" fill="#64748b" font-family="JetBrains Mono, monospace">DeploymentDeployedBeta1Event</text>
  <text x="220" y="602" text-anchor="middle" font-size="10" fill="#64748b">deployment_id, activity_status,</text>
  <text x="220" y="616" text-anchor="middle" font-size="10" fill="#64748b">target_status, deployed_at</text>

  <!-- deployment.removed.beta1 -->
  <rect x="380" y="548" width="280" height="76" rx="6" fill="#fefce8" stroke="#fcd34d" stroke-width="1"/>
  <text x="520" y="568" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">deployment.removed.beta1</text>
  <text x="520" y="586" text-anchor="middle" font-size="10" fill="#64748b" font-family="JetBrains Mono, monospace">DeploymentRemovedBeta1Event</text>
  <text x="520" y="602" text-anchor="middle" font-size="10" fill="#64748b">deployment_id, activity_status,</text>
  <text x="520" y="616" text-anchor="middle" font-size="10" fill="#64748b">target_status, archived_at</text>

  <!-- ==================== ROW 6: Query Params & Error Codes ==================== -->

  <rect x="60" y="658" width="380" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="682" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Client Reconnection</text>

  <text x="80" y="704" font-size="11" fill="#64748b">Query params:</text>
  <rect x="80" y="710" width="160" height="20" rx="4" fill="#f1f5f9"/>
  <text x="88" y="724" font-size="10" fill="#334155" font-family="JetBrains Mono, monospace">?after=42</text>
  <text x="255" y="724" font-size="10" fill="#94a3b8">cursor (takes precedence)</text>

  <rect x="80" y="734" width="340" height="20" rx="4" fill="#f1f5f9"/>
  <text x="88" y="748" font-size="10" fill="#334155" font-family="JetBrains Mono, monospace">?types=deployment.deployed.beta1</text>
  <text x="350" y="748" font-size="10" fill="#94a3b8">filter</text>

  <text x="80" y="772" font-size="11" fill="#64748b">Header:</text>
  <rect x="80" y="778" width="200" height="20" rx="4" fill="#f1f5f9"/>
  <text x="88" y="792" font-size="10" fill="#334155" font-family="JetBrains Mono, monospace">Last-Event-ID: 42</text>
  <text x="290" y="792" font-size="10" fill="#94a3b8">SSE standard</text>

  <!-- Error codes -->
  <rect x="460" y="658" width="260" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="682" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Error Responses</text>

  <rect x="480" y="696" width="50" height="20" rx="4" fill="#dcfce7"/>
  <text x="505" y="710" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">200</text>
  <text x="540" y="710" font-size="11" fill="#64748b">SSE stream open</text>

  <rect x="480" y="720" width="50" height="20" rx="4" fill="#fef3c7"/>
  <text x="505" y="734" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">400</text>
  <text x="540" y="734" font-size="11" fill="#64748b">Malformed cursor</text>

  <rect x="480" y="744" width="50" height="20" rx="4" fill="#fee2e2"/>
  <text x="505" y="758" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">410</text>
  <text x="540" y="758" font-size="11" fill="#64748b">Cursor expired</text>

  <rect x="480" y="768" width="50" height="20" rx="4" fill="#fce7f3"/>
  <text x="505" y="782" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">503</text>
  <text x="540" y="782" font-size="11" fill="#64748b">Hub not initialized</text>

  <!-- Key design decisions callout -->
  <rect x="740" y="572" width="296" height="216" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="888" y="596" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Key Design Decisions</text>

  <text x="760" y="618" font-size="11" fill="#64748b">Actor pattern (no locks)</text>
  <text x="760" y="638" font-size="11" fill="#64748b">JSONL for crash-safe durability</text>
  <text x="760" y="658" font-size="11" fill="#64748b">Monotonic IDs (not timestamps)</text>
  <text x="760" y="678" font-size="11" fill="#64748b">Subscribe-before-replay (no gaps)</text>
  <text x="760" y="698" font-size="11" fill="#64748b">Compaction at 50% of 2,000 max</text>
  <text x="760" y="718" font-size="11" fill="#64748b">Graceful degradation (hub optional)</text>
  <text x="760" y="738" font-size="11" fill="#64748b">Version in type string (beta1)</text>
  <text x="760" y="758" font-size="11" fill="#64748b">Fire-and-forget publish (try_publish)</text>
  <text x="760" y="778" font-size="11" fill="#64748b">30s heartbeat keep-alive</text>

  <!-- Legend dots -->
  <circle cx="752" cy="614" r="3" fill="#059669"/>
  <circle cx="752" cy="634" r="3" fill="#059669"/>
  <circle cx="752" cy="654" r="3" fill="#059669"/>
  <circle cx="752" cy="674" r="3" fill="#059669"/>
  <circle cx="752" cy="694" r="3" fill="#059669"/>
  <circle cx="752" cy="714" r="3" fill="#059669"/>
  <circle cx="752" cy="734" r="3" fill="#059669"/>
  <circle cx="752" cy="754" r="3" fill="#059669"/>
  <circle cx="752" cy="774" r="3" fill="#059669"/>
</svg>