name: Release

on:
  push:
    tags:
      - '*'

permissions:
  checks: write
  contents: write
  packages: write

jobs:

  check-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check ancestry
        id: check
        run: |
          git fetch origin main 'refs/heads/release/*:refs/remotes/origin/release/*'
          ON_MAIN=false
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            ON_MAIN=true
          else
            for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/release/); do
              if git merge-base --is-ancestor "$GITHUB_SHA" "$ref"; then
                ON_MAIN=true
                break
              fi
            done
          fi
          echo "on_main=$ON_MAIN" >> "$GITHUB_OUTPUT"
          if [ "$ON_MAIN" = "false" ]; then
            echo "::notice::Tag is not on main or release/* — skipping release."
          fi

  ci:
    needs: check-main
    if: needs.check-main.outputs.on_main == 'true'
    uses: ./.github/workflows/ci.yml

  release:
    runs-on: ubuntu-latest
    needs: [ci, check-main]
    if: needs.check-main.outputs.on_main == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch the entire history so that we can correctly determine the previous tag
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        run: ./build/release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
