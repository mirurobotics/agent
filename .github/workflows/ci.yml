name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Cargo Tools (binstall)
        uses: cargo-bins/cargo-binstall@main

      - name: Install Linters
        run: cargo binstall --no-confirm cargo-machete cargo-diet

      - name: Check Formatting
        run: cargo fmt -p miru-agent -- --check

      - name: Run Clippy
        run: cargo clippy --package miru-agent --fix --allow-dirty --all-features -- -D warnings

      - name: Check for Unused Dependencies (Machete)
        run: cargo machete

      - name: Security Audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run Tests and Coverage
        run: ./scripts/covgate.sh

  lint-tool:
    name: Lint Tool
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Check Formatting
        run: cargo fmt --manifest-path tools/lint/Cargo.toml -- --check

      - name: Run Clippy
        run: cargo clippy --manifest-path tools/lint/Cargo.toml -- -D warnings

      - name: Run Tests + Coverage Gate
        run: ./tools/lint/scripts/covgate.sh
