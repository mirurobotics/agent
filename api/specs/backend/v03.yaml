      description: Update a deployment.
      parameters:
      - $ref: '#/components/parameters/deployment_id'
      - $ref: '#/components/parameters/deployment_expansions'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeploymentRequest'
      responses:
        '200':
          description: Successfully updated the deployment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
  /releases/{release_id}:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    get:
      tags:
      - Releases
      summary: Get
      operationId: getRelease
      description: Retrieve a release by its ID.
      parameters:
      - $ref: '#/components/parameters/release_id'
      responses:
        '200':
          description: Successfully retrieved the release.
          content:
            application/json:
              schema:
