openapi: 3.0.3
info:
  title: Miru Agent API
  description: The API between the Miru Backend and the Agent; for internal use only
  version: v0.3
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-release-version: v0.3.0-beta.3
  x-git-commit:
    sha: ed8164f495e1b2735eab8124f21e58b0f9b23a4e
    url: https://github.com/mirurobotics/openapi/commit/ed8164f495e1b2735eab8124f21e58b0f9b23a4e
    message: 'feat(api): add provisioning token endpoints (#32)


      ## Summary

      - Add provisioning token endpoints (create, get, list, revoke) and a

      `ProvisioningToken` resource that pins an optional `device_id` and

      exposes capabilities (`create`, `activate`, `reactivate`).

      - Wire the agent''s `provisionDevice` operation to the new model: the

      device is identified by the token''s `device_id` for activate/reactivate,

      and request bodies no longer carry `device_id`.

      - Round out list endpoints with expansions (`created_by`, `updated_by`,

      `total_count`) and search parameters (`id`, `is_expired`, `is_revoked`);

      rename the resource''s `revoked` boolean to `is_revoked` to match.

      - Refresh the resource shape: drop

      `status`/`max_uses`/`uses_count`/`device_ids` in favor of `device_id` +

      `is_revoked`, and rewrite request/response examples to match.


      ## Test plan

      - [ ] CI: `scripts/lint.sh` passes (Redocly + MIRU custom linter).

      - [ ] Generated bundles in

      `apis/apps/backend-server/{agent,frontend,platform}/openapi.gen.yaml`

      are coherent with their sources (no `is-stale` regressions).

      - [ ] Spot-check generated SDKs / Stainless configs for the

      provisioning-token surface in a downstream consumer.


      🤖 Generated with [Claude Code](https://claude.com/claude-code)


      ---------


      Co-authored-by: Claude Opus 4.7 (1M context) <noreply@anthropic.com>'
