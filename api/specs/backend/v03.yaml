  /git_commits/{git_commit_id}:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    get:
      tags:
      - Git Commits
      summary: Get
      operationId: getGitCommit
      description: Retrieve a git commit by its ID.
      parameters:
      - $ref: '#/components/parameters/git_commit_id'
      responses:
        '200':
          description: Successfully retrieved the git commit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitCommit'
  /device:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    get:
      tags:
      - Devices
      summary: Get Self
      operationId: getDeviceSelf
      description: 'Retrieve the calling device''s own record. The device is identified
        by the bearer session token from the `DeviceSessionToken` security scheme.

        '
      responses:
        '200':
          description: Successfully retrieved the calling device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
  /devices/{device_id}:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    patch:
      tags:
      - Devices
      summary: Update
      operationId: updateDeviceByAgent
      description: Update a device from the agent.
      parameters:
      - $ref: '#/components/parameters/device_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceFromAgentRequest'
      responses:
        '200':
          description: Successfully updated the device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
  /devices/provision:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    post:
      tags:
      - Devices
      summary: Provision
      operationId: provisionDevice
      description: Provision a device.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionDeviceRequest'
      responses:
        '200':
          description: Successfully provisioned the device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
  /devices/issue_token:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    post:
      tags:
      - Devices
      summary: Issue Token
      operationId: issueDeviceToken
      security:
      - DeviceKeyJWT: []
      description: 'Issue a device session token. The device authenticates by sending
        an `Authorization: Bearer <jwt>` header carrying a JWT it has self-signed
        with its own RSA private key. The server identifies the device by computing
        the SHA-256 fingerprint of the public key embedded in the JWT header (`jwk`
        parameter, RFC 7517) and looking up the matching device record; it then verifies
        the JWT signature against that same `header.jwk`, enforces the `exp` and `jti`
        payload claims, and returns a session token.


        JWT contract:

        - Header MUST contain `alg: RS512` (RSA-PKCS1-v1_5 with SHA-512). Other algorithms
        — including `none`, HS*, RS256, RS384, ES*, PS* — MUST be rejected.

        - Header MUST contain `jwk` (the device''s RSA public key as a JSON Web Key,
        RFC 7517).

        - Payload MUST contain `jti` (a unique nonce per request, used for replay
        protection) and `exp` (expiration, RFC 7519 numeric date).

        - Payload SHOULD contain `iat` (issued-at, RFC 7519 numeric date).


        Failure modes:

        - The JWT is malformed or the `alg` is not `RS512`.

        - Signature verification against `header.jwk` fails.

        - `exp` is in the past.

        - `jti` has already been seen (replay).

        - No device is registered for the public key embedded in `header.jwk`.

        - The device exists but is inactive.

        '
      responses:
        '200':
          description: Successfully issued the device token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /cmd/devices/{device_id}/sync:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    get:
      tags:
      - MQTT
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          example: dvc_123
      summary: Sync
      operationId: syncDevice
      description: Send a sync command to a device.
      responses:
        '200':
          description: Triggered a device sync.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncDevice'
  /cmd/devices/{device_id}/ping:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    get:
      tags:
      - MQTT
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          example: dvc_123
      summary: Ping
      operationId: pingDevice
      description: Send a ping command to a device.
      responses:
        '200':
          description: Ping a device.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ping'
  /resp/devices/{device_id}/pong:
    parameters:
    - $ref: '#/components/parameters/MiruVersion'
    get:
      tags:
      - MQTT
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          example: dvc_123
      summary: Pong
      operationId: devicePong
      description: Receive a pong response from a device.
      responses:
        '200':
          description: Ping response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pong'
components:
  securitySchemes:
    DeviceSessionToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Server-issued device session token. Obtained by the device from
        `POST /devices/issue_token` (defined in this spec) using its `DeviceKeyJWT`
        bootstrap credential, then sent as `Authorization: Bearer <token>` on every
        other agent endpoint. The token identifies the calling device to the backend.

        '
    DeviceKeyJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Device-self-signed JWT used to bootstrap a session token. The
        device signs a JWT with its own RSA private key; the server identifies the
        device by computing the SHA-256 fingerprint of the public key embedded in
        the JWT header (`jwk` parameter) and looking up the matching device record.

        '
  schemas:
    APIVersion:
      type: string
      enum:
      - v0.3
      x-enum-varnames:
      - API_VERSION
      x-stainless-const: true
    APIGitCommit:
      type: string
      enum:
      - ed8164f495e1b2735eab8124f21e58b0f9b23a4e
      x-enum-varnames:
      - API_GIT_COMMIT
      x-stainless-const: true
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/Error'
    DplSearch:
      type: string
      description: '**Internal server use only**: an enum of possible search fields.

        '
      enum:
      - activity_status
      x-enum-varnames:
      - DPL_SEARCH_ACTIVITY_STATUS
    Version:
      title: Version
      type: object
      required:
      - version
      - git_commit
      - api_version
      - api_git_commit
      - go_version
      - build_date
      - os
      - arch
      properties:
        version:
          type: string
          description: The version of the application.
          example: v1.0.0
        git_commit:
          type: string
          description: The git commit of the application.
          example: a1b2c3d4
        api_version:
          type: string
          description: The API version of the application.
          example: 2026-02-24.zion
        api_git_commit:
          type: string
          description: The git commit of the API.
          example: a1b2c3d4
        go_version:
          type: string
          description: The version of Go.
          example: go1.20.0
        build_date:
          type: string
          format: date-time
          description: The build date of the application.
          example: '2025-01-01T00:00:00Z'
        os:
          type: string
          description: The operating system of the application.
          example: linux
        arch:
          type: string
          description: The architecture of the application.
          example: aarch64
      example:
        version: v1.0.0
        git_commit: a1b2c3d4
        api_version: 2026-02-24.zion
        api_git_commit: a1b2c3d4
        go_version: go1.20.0
        build_date: '2025-01-01T00:00:00Z'
        os: linux
        arch: aarch64
    DeploymentListExpansion:
      type: string
      enum:
      - total_count
      - release
      - config_instances
      x-enum-varnames:
      - DEPLOYMENT_LIST_EXPAND_TOTAL_COUNT
      - DEPLOYMENT_LIST_EXPAND_RELEASE
      - DEPLOYMENT_LIST_EXPAND_CONFIG_INSTANCES
    DeploymentActivityStatus:
      type: string
      description: 'Last known activity state of the deployment.


        `drifted` means the device''s configurations have drifted since this deployment
        was staged, and the deployment needs to be reviewed before it can be deployed.


        `staged` means the deployment is ready to be deployed.


        `queued` means the deployment''s config instances are waiting to be received
        by the device and will be deployed as soon as the device is online.


        `deployed` means the deployment''s config instances are currently available
        for consumption on the device.


        `removing` means the deployment''s config instances are being removed from
        the device.


        `archived` means the deployment is available for historical reference but
        cannot be deployed and is not active on the device.

        '
      enum:
      - drifted
      - staged
      - queued
      - deployed
      - removing
      - archived
      x-enum-varnames:
      - DEPLOYMENT_ACTIVITY_STATUS_DRIFTED
      - DEPLOYMENT_ACTIVITY_STATUS_STAGED
      - DEPLOYMENT_ACTIVITY_STATUS_QUEUED
      - DEPLOYMENT_ACTIVITY_STATUS_DEPLOYED
      - DEPLOYMENT_ACTIVITY_STATUS_REMOVING
      - DEPLOYMENT_ACTIVITY_STATUS_ARCHIVED
    PaginatedList:
      title: Paginated List
      type: object
      required:
      - object
      - limit
      - offset
      - has_more
      properties:
        object:
          type: string
          enum:
          - list
          example: list
          x-stainless-const: true
          description: The object type, which is always `list`.
        total_count:
          type: integer
          format: int64
          description: The total number of items in the list. By default the total
            count is not returned. The total count must be expanded (using expand=total_count)
            to get the total number of items in the list.
        limit:
          type: integer
          description: The maximum number of items to return. A limit of 15 with an
            offset of 0 returns items 1-15.
          default: 10
          minimum: 1
          maximum: 100
        offset:
          type: integer
          description: The offset of the items to return. An offset of 10 with a limit
            of 10 returns items 11-20.
          default: 0
          minimum: 0
        has_more:
          type: boolean
          description: True if there are more items in the list to return. False if
            there are no more items to return.
          example: false
    DeploymentStatus:
      type: string
      description: 'This status merges the ''activity_status'' and ''error_status''
        fields, with error states taking precedence over activity states when errors
        are present. For example, if the activity status is ''deployed'' but the error
        status is ''failed'', the status is ''failed''. However, if the error status
        is ''none'' and the activity status is ''deployed'', the status is ''deployed''.

        '
      enum:
      - drifted
      - staged
      - queued
      - deployed
      - removing
      - archived
      - failed
      - retrying
      x-enum-varnames:
      - DEPLOYMENT_STATUS_DRIFTED
      - DEPLOYMENT_STATUS_STAGED
      - DEPLOYMENT_STATUS_QUEUED
      - DEPLOYMENT_STATUS_DEPLOYED
      - DEPLOYMENT_STATUS_REMOVING
      - DEPLOYMENT_STATUS_ARCHIVED
      - DEPLOYMENT_STATUS_FAILED
      - DEPLOYMENT_STATUS_RETRYING
    DeploymentErrorStatus:
      type: string
      description: 'Last known error state of the deployment.


        `none` means there are no errors.


        `retrying` means an error has been encountered and the agent is retrying to
        reach the target status.


        `failed` means a fatal error has been encountered; the deployment is archived
        and, if deployed, removed from the device.

        '
      enum:
      - none
      - failed
      - retrying
      x-enum-varnames:
      - DEPLOYMENT_ERROR_STATUS_NONE
      - DEPLOYMENT_ERROR_STATUS_FAILED
      - DEPLOYMENT_ERROR_STATUS_RETRYING
    DeploymentTargetStatus:
      type: string
      description: 'Desired state of the deployment.


        `staged` means the deployment is ready to be deployed.


        `deployed` means all config instances in the deployment are available for
        consumption on the device.


        `archived` means the deployment is available for historical reference but
        cannot be deployed and is not active on the device.

        '
      enum:
      - staged
      - deployed
      - archived
      x-enum-varnames:
      - DEPLOYMENT_TARGET_STATUS_STAGED
      - DEPLOYMENT_TARGET_STATUS_DEPLOYED
      - DEPLOYMENT_TARGET_STATUS_ARCHIVED
    BaseDeployment:
      title: Base Deployment
      type: object
      required:
      - object
      - id
      - description
      - status
      - activity_status
      - error_status
      - target_status
      - device_id
      - release_id
      - created_at
      - updated_at
      properties:
        object:
          type: string
          enum:
          - deployment
          example: deployment
          x-stainless-const: true
          description: The object type, which is always `deployment`.
        id:
          type: string
          example: dpl_123
          description: ID of the deployment.
        description:
          type: string
          example: Deployment for the motion control config instance
          description: The description of the deployment.
        status:
          $ref: '#/components/schemas/DeploymentStatus'
        activity_status:
          $ref: '#/components/schemas/DeploymentActivityStatus'
        error_status:
          $ref: '#/components/schemas/DeploymentErrorStatus'
        target_status:
          $ref: '#/components/schemas/DeploymentTargetStatus'
        device_id:
          type: string
          example: dvc_123
          description: ID of the device.
        release_id:
          type: string
          example: rls_123
          description: ID of the release.
        created_at:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
          description: Timestamp of when the device release was created.
        updated_at:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
          description: Timestamp of when the device release was last updated.
    BaseRelease:
      title: Base Release
      type: object
      required:
      - object
      - id
      - version
      - git_commit_id
      - created_at
      - updated_at
      properties:
        object:
          type: string
          enum:
          - release
          example: release
          x-stainless-const: true
          description: The object type, which is always `release`.
        id:
          type: string
          example: rls_123
          description: ID of the release.
        version:
          type: string
          example: v1.0.0
          description: The version of the release.
        git_commit_id:
          type: string
          nullable: true
          example: git_commit_123
          description: The ID of the git commit associated with this release.
        created_at:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
          description: Timestamp of when the release was created.
        updated_at:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
          description: Timestamp of when the release was last updated.
    GitRepositoryType:
      type: string
      enum:
      - github
      - gitlab
      - bitbucket
      x-enum-varnames:
      - GIT_REPO_TYPE_GITHUB
      - GIT_REPO_TYPE_GITLAB
      - GIT_REPO_TYPE_BITBUCKET
    BaseGitCommit:
      title: Base Git Commit
      type: object
      required:
      - object
      - id
      - sha
      - message
      - repository_owner
      - repository_name
      - repository_type
      - repository_url
      - commit_url
      - created_at
      properties:
        object:
          type: string
          enum:
          - git_commit
          example: git_commit
          x-stainless-const: true
          description: The object type, which is always `git_commit`.
        id:
          type: string
          example: git_commit_123
          description: ID of the git commit.
        sha:
          type: string
          example: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0
          description: The SHA hash of the git commit.
        message:
          type: string
          example: Add basic motion configurations
          description: The commit message.
        repository_owner:
          type: string
          example: user
          description: The owner of the git repository.
        repository_name:
          type: string
          example: repo
          description: The name of the git repository.
        repository_type:
          $ref: '#/components/schemas/GitRepositoryType'
        repository_url:
          type: string
          example: https://github.com/user/repo
          description: The URL of the git repository.
        commit_url:
          type: string
          example: https://github.com/user/repo/commit/a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0
          description: The URL of the git commit.
        created_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          description: Timestamp of when the git commit was created.
    GitCommit:
      title: Git Commit
      allOf:
      - $ref: '#/components/schemas/BaseGitCommit'
      example:
        object: git_commit
        id: git_commit_123
        sha: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0
        message: Add basic motion configurations
        repository_owner: user
        repository_name: repo
        repository_type: github
        repository_url: https://github.com/user/repo
        commit_url: https://github.com/user/repo/commit/a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0
        created_at: '2021-01-01T00:00:00Z'
    Release:
      title: Release
      allOf:
      - $ref: '#/components/schemas/BaseRelease'
      - type: object
        properties:
          git_commit:
            description: The git commit associated with this release.
            nullable: true
            allOf:
            - $ref: '#/components/schemas/GitCommit'
      example:
        object: release
        id: rls_123
        version: v1.0.0
        git_commit_id: git_commit_123
        created_at: '2024-01-01T00:00:00Z'
        updated_at: '2024-01-01T00:00:00Z'
    BaseConfigInstance:
      title: Base Config Instance
      type: object
      required:
      - object
      - id
      - config_type_name
      - filepath
      - created_at
      - config_schema_id
      - config_type_id
      properties:
        object:
          type: string
          enum:
          - config_instance
          example: config_instance
          x-stainless-const: true
          description: The object type, which is always `config_instance`.
        id:
          type: string
          example: cfg_inst_123
          description: ID of the config instance.
        config_type_name:
          type: string
          example: Motion Control
          description: The name of the config type.
        filepath:
          type: string
          example: /srv/miru/configs/v1/motion-control.json
          description: The absolute filesystem path where this config instance is
            written.
        created_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          description: The timestamp of when the config instance was created.
        config_schema_id:
          type: string
          example: cfg_sch_123
          description: ID of the config schema which the config instance must adhere
            to.
        config_type_id:
          type: string
          example: cfg_type_123
          description: ID of the config type which the config instance (and its schema)
            is a part of.
    InstanceFormat:
      title: Instance Format
      type: string
      enum:
      - json
      - yaml
      x-enum-varnames:
      - INSTANCE_FORMAT_JSON
      - INSTANCE_FORMAT_YAML
    InstanceContent:
      title: Instance Content
      type: object
      required:
      - format
      - data
      properties:
        format:
          $ref: '#/components/schemas/InstanceFormat'
        data:
          type: string
          description: The configuration values associated with the config instance.
          example: "{\n  \"enable_autonomy\": true,\n  \"enable_remote_control\":\
            \ true,\n  \"max_payload_kg\": 10.0\n}\n"
      example:
        format: json
        data: "{\n  \"enable_autonomy\": true,\n  \"enable_remote_control\": true,\n\
          \  \"max_payload_kg\": 10.0\n}\n"
    ConfigInstance:
      title: Config Instance
      allOf:
      - $ref: '#/components/schemas/BaseConfigInstance'
      - type: object
        properties:
          content:
            allOf:
            - $ref: '#/components/schemas/InstanceContent'
            description: The configuration values associated with the config instance.
              Expand the content using 'expand=content' in the query string.
      example:
        object: config_instance
        id: cfg_inst_123
        config_type_name: Motion Control
        filepath: /srv/miru/configs/v1/motion-control.json
        created_at: '2021-01-01T00:00:00Z'
        config_schema_id: cfg_sch_123
        config_type_id: cfg_typ_123
    Deployment:
      title: Deployment
      allOf:
      - $ref: '#/components/schemas/BaseDeployment'
      - type: object
        properties:
          release:
            allOf:
            - $ref: '#/components/schemas/Release'
            description: Expand the release using 'expand=release' in the query string.
          config_instances:
            type: array
            items:
              $ref: '#/components/schemas/ConfigInstance'
            description: Expand the config instances using 'expand=config_instances'
              in the query string.
            example:
            - object: config_instance
              id: cfg_inst_123
              config_type_name: Motion Control
              filepath: /srv/miru/configs/v1/motion-control.json
              created_at: '2021-01-01T00:00:00Z'
              config_schema_id: cfg_sch_123
              config_type_id: cfg_typ_123
            - object: config_instance
              id: cfg_inst_456
              config_type_name: Localization
              filepath: /srv/miru/configs/v1/localization.json
              created_at: '2021-01-02T00:00:00Z'
              config_schema_id: cfg_sch_456
              config_type_id: cfg_typ_456
      example:
        object: deployment
        id: dpl_123
        description: Deployment for the motion control config instance
        status: staged
        activity_status: staged
        error_status: none
        target_status: staged
        device_id: dvc_123
        release_id: rls_123
        created_at: '2024-01-01T00:00:00Z'
        updated_at: '2024-01-01T00:00:00Z'
    DeploymentList:
      title: Deployment List
      allOf:
      - $ref: '#/components/schemas/PaginatedList'
      - type: object
        required:
        - data
        properties:
          data:
            description: The list of deployments.
            type: array
            items:
              $ref: '#/components/schemas/Deployment'
    DeploymentExpansion:
      type: string
      enum:
      - release
      - config_instances
      x-enum-varnames:
      - DEPLOYMENT_EXPAND_RELEASE
      - DEPLOYMENT_EXPAND_CONFIG_INSTANCES
    UpdateDeploymentRequest:
      title: Update Deployment Request
      type: object
      properties:
        activity_status:
          allOf:
          - $ref: '#/components/schemas/DeploymentActivityStatus'
          description: The updated activity status of the deployment.
        error_status:
          allOf:
          - $ref: '#/components/schemas/DeploymentErrorStatus'
          description: The updated error status of the deployment.
        deployed_at:
          type: string
          format: date-time
          description: Independent historical watermark recording the last time the
            agent transitioned this deployment to Deployed. The current state is determined
            by activity_status, not by which timestamp is present. Set by the agent.
        archived_at:
          type: string
          format: date-time
          description: Independent historical watermark recording the last time the
            agent transitioned this deployment to Archived. The current state is determined
            by activity_status, not by which timestamp is present. Set by the agent.
    DeviceStatus:
      type: string
      description: 'The status of the device.

        - Inactive: The miru agent has not yet been installed / authenticated

        - Activating: The miru agent is currently being installed / authenticated
        (should only last for a few seconds)

        - Online: The miru agent has successfully pinged the server within the last
        60 seconds.

        - Offline: The miru agent has not successfully pinged the server within the
        last 60 seconds (e.g. network issues, device is powered off, etc.)

        '
      enum:
      - inactive
      - activating
      - online
      - offline
      x-enum-varnames:
      - DEVICE_STATUS_INACTIVE
      - DEVICE_STATUS_ACTIVATING
      - DEVICE_STATUS_ONLINE
      - DEVICE_STATUS_OFFLINE
    BaseDevice:
      title: Base Device
      type: object
      required:
      - object
      - id
      - name
      - status
      - agent_version
      - last_connected_at
      - last_disconnected_at
      - created_at
      - updated_at
      properties:
        object:
          type: string
          enum:
          - device
          example: device
          x-stainless-const: true
          description: The object type, which is always `device`.
        id:
          type: string
          example: dvc_123
          description: ID of the device.
        name:
          type: string
          example: My Device
          description: Name of the device.
        status:
          $ref: '#/components/schemas/DeviceStatus'
        agent_version:
          type: string
          example: v1.0.0
          description: The version of the agent the device is running.
          nullable: true
        last_connected_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          nullable: true
          description: Timestamp of when the device was last made an initial connection
            (this is not the same as the last time the device was seen).
        last_disconnected_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          nullable: true
          description: Timestamp of when the device was last disconnected (this is
            not the same as the last time the device was seen).
        created_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          description: Timestamp of when the device was created.
        updated_at:
          type: string
          format: date-time
          example: '2021-01-01T00:00:00Z'
          description: Timestamp of when the device was last updated.
    Device:
      title: Device
      allOf:
      - $ref: '#/components/schemas/BaseDevice'
      - type: object
        required:
        - session_id
        properties:
          session_id:
            type: string
            example: dvc_sess_123
            description: Session ID of the device.
      example:
        object: device
        id: dvc_123
        name: My Device
        status: online
        agent_version: v1.0.0
        last_connected_at: '2021-01-01T00:00:00Z'
        last_disconnected_at: null
        created_at: '2021-01-01T00:00:00Z'
        updated_at: '2021-01-01T00:00:00Z'
        session_id: dvc_sess_123
    UpdateDeviceFromAgentRequest:
      title: Update Device From Agent Request
      type: object
      properties:
        agent_version:
          type: string
          description: The version of the agent the device is running.
          example: v1.0.0
    ProvisionDeviceRequest:
      title: Provision Device Request
      type: object
      description: Provision a device using a provisioning token.
      required:
      - public_key_pem
      - agent_version
      properties:
        public_key_pem:
          type: string
          description: The public key in PEM format.
          example: '-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAjVb+KEVBPIGDulBAuAUL\nT8PMvLW+VZ8aZ5p63/uHxM15fSPGnWZ4YtRHVed9gVRufrld3Pei7lP1LB88x6T0\nOPIQjMVXtx87bYSFFSrjqNg9yDUn17HDg7afehXoFuFi/q2QtTBKgOZqnPTRVHEM\nJqVjGCGb70AzpbcS6kdmlGjQY1R9uLbn8hREY+bUq5qgsnC2xfp5iioSYK8bkIUH\nexGybOcSLO21YIIsWoysBPppc1qqSo46L/xK+YjYkdMi3Qt0I07lS6FQk4lbUr6h\nHqRyCVEfUgqX4zy2ba0PHNImokltQfwrljfCZ/odCazCvqbrNptreQLoNVtN7NA4\nYQIDAQAB\n-----END
            PUBLIC KEY-----

            '
        agent_version:
          type: string
          description: The version of the agent the device is running.
          example: v1.0.0
        name:
          type: string
          example: Robot 1
          description: The name to assign to the device. Only meaningful for the `create`
            capability; ignored by `activate` and `reactivate` because the device
            already has a name.
    TokenResponse:
      title: Token Response
      type: object
      required:
      - token
      - expires_at
      properties:
        token:
          type: string
          description: The token.
          example: eyJhbGciOiJ...
        expires_at:
          type: string
          format: date-time
          description: The expiration date and time of the token.
          example: '2025-01-01T00:00:00Z'
      example:
        token: eyJhbGciOiJ...
        expires_at: '2025-01-01T00:00:00Z'
    SyncDevice:
      type: object
      required:
      - is_synced
      properties:
        is_synced:
          type: boolean
          example: true
          description: Whether the device is synced.
      example:
        is_synced: true
    Ping:
      type: object
      required:
      - message_id
      - timestamp
      properties:
        message_id:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
          description: The unique identifier of the ping message.
        timestamp:
          type: string
          format: date-time
          example: '2025-08-27T12:00:00Z'
          description: The timestamp of when the ping was sent.
      example:
        message_id: 123e4567-e89b-12d3-a456-426614174000
        timestamp: '2025-08-27T12:00:00Z'
    Pong:
      type: object
      required:
      - message_id
      - timestamp
      properties:
        message_id:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
          description: The unique identifier of the pong message.
        timestamp:
          type: string
          format: date-time
          example: '2025-08-27T12:00:00Z'
          description: The timestamp of when the pong was received.
      example:
        message_id: 123e4567-e89b-12d3-a456-426614174000
        timestamp: '2025-08-27T12:00:00Z'
    Error:
      type: object
      required:
      - code
      - params
      - message
      properties:
        code:
          type: string
          example: invalid_request
          description: The error code identifying the type of error.
        params:
          type: object
          additionalProperties: true
          example:
            param1: value1
            param2: value2
          description: Additional parameters providing context about the error.
        message:
          type: string
          example: This is a message for a user
          description: A human-readable message describing the error.
  parameters:
    MiruVersion:
      name: Miru-Version
      in: header
      required: true
      schema:
        type: string
        example: v0.3
      description: The API version the client was built against.
    config_instance_id:
      name: config_instance_id
      in: path
      required: true
      description: The unique identifier of the config instance.
      schema:
        type: string
        example: cfg_inst_123
    disposition:
      name: disposition
      in: query
      required: false
      description: Controls the Content-Disposition behavior. Use `inline` to display
        in browser or `attachment` to trigger a file download.
      schema:
        type: string
        enum:
        - inline
        - attachment
        default: inline
        example: inline
    offset:
      name: offset
      in: query
      required: false
      description: The offset of the items to return. An offset of 10 with a limit
        of 10 returns items 11-20.
      schema:
        type: integer
        default: 0
        minimum: 0
        example: 0
    limit:
      name: limit
      in: query
      required: false
      description: The maximum number of items to return. A limit of 15 with an offset
        of 0 returns items 1-15.
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
        example: 10
    deployment_list_expansions:
      name: expand
      in: query
      required: false
      description: Fields to expand on each deployment in the list.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/DeploymentListExpansion'
        example:
        - release
    deployment_search_activity_status:
      name: activity_status
      in: query
      required: false
      style: form
      explode: false
      description: The deployment activity statuses to filter by.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/DeploymentActivityStatus'
        example:
        - drifted
    deployment_id:
      name: deployment_id
      in: path
      required: true
      description: The unique identifier of the deployment.
      schema:
        type: string
        example: dpl_123
    deployment_expansions:
      name: expand
      in: query
      required: false
      description: Fields to expand on the deployment resource.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/DeploymentExpansion'
        example:
        - release
    release_id:
      name: release_id
      in: path
      required: true
      description: The unique identifier of the release.
      schema:
        type: string
        example: rls_123
    git_commit_id:
      name: git_commit_id
      in: path
      required: true
      description: The unique identifier of the git commit.
      schema:
        type: string
        example: git_commit_123
    device_id:
      name: device_id
      in: path
      required: true
      description: The unique identifier of the device.
      schema:
        type: string
        example: dvc_123
